# Cấu hình Server
server:
  port: 8080

spring:
  # Cấu hình kết nối MySQL
  datasource:
    # Thay 'HotelDB_Schema' bằng tên database thực tế của bạn nếu khác
    url: jdbc:mysql://localhost:3306/HotelDB_Schema?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      # 'validate': Chỉ kiểm tra Entity có khớp DB hay không, không tự ý tạo thêm cột/bảng
      ddl-auto: validate
    show-sql: true # Bật tính năng này để console in ra các câu lệnh SQL, rất dễ debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Cấu hình đường dẫn cho Swagger (Tài liệu API)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method # Sắp xếp các API theo GET, POST, PUT, DELETE
