# Cấu hình Server
server:
  port: 8080

spring:
  # Cấu hình kết nối MySQL
  datasource:
    # Thay 'HotelDB_Schema' bằng tên database thực tế của bạn nếu khác
    url: jdbc:mysql://localhost:3306/HotelDB_Schema?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Cấu hình JPA / Hibernate
  jpa:
    hibernate:
      # 'update': Tự động tạo/cập nhật bảng trong DB dựa trên các class Entity bạn code
      # (rất tiện khi đang dev, nhưng khi lên production thường đổi thành 'validate' hoặc 'none')
      ddl-auto: update
    show-sql: true # Bật tính năng này để console in ra các câu lệnh SQL, rất dễ debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Cấu hình đường dẫn cho Swagger (Tài liệu API)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method # Sắp xếp các API theo GET, POST, PUT, DELETE
